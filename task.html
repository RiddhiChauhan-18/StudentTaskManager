<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Task Manager</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,sans-serif;
background:linear-gradient(to right,#dff6ff,#f2fff5);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
transition:0.3s;
}

body.dark{
background:#121212;
color:white;
}

.container{
background:white;
width:100%;
max-width:900px;
padding:30px;
border-radius:18px;
box-shadow:0 10px 25px rgba(0,0,0,0.15);
transition:0.3s;
}

body.dark .container{
background:#1e1e1e;
}

h1{
text-align:center;
color:#1565c0;
margin-bottom:25px;
}

body.dark h1{
color:#66b3ff;
}

.input-section{
display:grid;
grid-template-columns:2fr 1fr 1fr 1fr auto;
gap:10px;
margin-bottom:20px;
}

.search-box{
margin-bottom:20px;
}

.search-box input{
width:100%;
padding:12px;
font-size:15px;
border:2px solid #ddd;
border-radius:8px;
}

input,select{
padding:12px;
font-size:15px;
border:2px solid #ddd;
border-radius:8px;
outline:none;
}

button{
padding:12px 18px;
border:none;
background:linear-gradient(to right,#1565c0,#2e7d32);
color:white;
border-radius:8px;
cursor:pointer;
}

button:hover{
opacity:0.9;
}

.top-buttons{
display:flex;
gap:10px;
justify-content:center;
margin-bottom:20px;
flex-wrap:wrap;
}

.stats{
display:flex;
justify-content:center;
gap:20px;
margin-bottom:20px;
flex-wrap:wrap;
}

.stat-box{
background:#f3f3f3;
padding:12px 18px;
border-radius:10px;
font-weight:bold;
}

body.dark .stat-box{
background:#333;
}

.filters{
text-align:center;
margin-bottom:20px;
}

.filters button{
margin:5px;
}

.progress-container{
background:#ddd;
height:20px;
border-radius:20px;
overflow:hidden;
margin-bottom:20px;
}

.progress-bar{
height:100%;
width:0%;
background:linear-gradient(to right,#1565c0,#2e7d32);
transition:0.3s;
}

ul{
list-style:none;
}

li{
background:#f7f7f7;
padding:15px;
margin-bottom:12px;
border-radius:10px;
display:flex;
justify-content:space-between;
align-items:center;
}

body.dark li{
background:#2a2a2a;
}

.completed{
background:#c8f7c5;
text-decoration:line-through;
color:gray;
}

.task-info{
flex:1;
cursor:pointer;
}

.task-info small{
display:block;
margin-top:5px;
color:#555;
}

body.dark .task-info small{
color:#ccc;
}

.delete-btn{
background:#e53935;
padding:8px 12px;
margin-left:10px;
}

.priority-high{color:red;font-weight:bold;}
.priority-medium{color:orange;font-weight:bold;}
.priority-low{color:green;font-weight:bold;}

.empty{
text-align:center;
color:gray;
}

@media(max-width:768px){

.input-section{
grid-template-columns:1fr;
}

.stats{
flex-direction:column;
}

}

</style>
</head>

<body>

<div class="container">

<h1>📚 Student Task Manager</h1>

<div class="top-buttons">
<button onclick="toggleDarkMode()">🌙 Dark Mode</button>
<button onclick="clearAllTasks()">🗑️ Clear All</button>
</div>

<div class="search-box">
<input type="text" id="searchInput" placeholder="Search tasks..." onkeyup="renderTasks()">
</div>

<div class="input-section">

<input type="text" id="taskInput" placeholder="Enter task">

<select id="subject">
<option value="DBMS">DBMS</option>
<option value="DSA">DSA</option>
<option value="Python">Python</option>
<option value="Web Dev">Web Dev</option>
<option value="Other">Other</option>
</select>

<input type="date" id="dueDate">

<select id="priority">
<option value="High">High</option>
<option value="Medium">Medium</option>
<option value="Low">Low</option>
</select>

<button onclick="addTask()">Add</button>

</div>

<div class="stats">
<div class="stat-box">Total: <span id="totalCount">0</span></div>
<div class="stat-box">Pending: <span id="pendingCount">0</span></div>
<div class="stat-box">Completed: <span id="completedCount">0</span></div>
</div>

<div class="progress-container">
<div class="progress-bar" id="progressBar"></div>
</div>

<div class="filters">
<button onclick="filterTasks('all')">All</button>
<button onclick="filterTasks('pending')">Pending</button>
<button onclick="filterTasks('completed')">Completed</button>
</div>

<ul id="taskList"></ul>

<p class="empty" id="emptyText">No tasks added yet.</p>

</div>

<script>

let tasks = JSON.parse(localStorage.getItem("tasks")) || [];
let currentFilter = "all";

renderTasks();

function addTask(){

let task=document.getElementById("taskInput").value.trim();
let subject=document.getElementById("subject").value;
let dueDate=document.getElementById("dueDate").value;
let priority=document.getElementById("priority").value;

if(task===""){
alert("Please enter a task!");
return;
}

tasks.push({
name:task,
subject:subject,
date:dueDate,
priority:priority,
completed:false
});

saveTasks();
renderTasks();

document.getElementById("taskInput").value="";
document.getElementById("dueDate").value="";

}

function renderTasks(){

let list=document.getElementById("taskList");
let search=document.getElementById("searchInput").value.toLowerCase();

list.innerHTML="";

tasks.forEach((item,index)=>{

if(!item.name.toLowerCase().includes(search)) return;
if(currentFilter==="completed" && !item.completed) return;
if(currentFilter==="pending" && item.completed) return;

let li=document.createElement("li");

if(item.completed){
li.classList.add("completed");
}

let priorityClass="priority-low";
if(item.priority==="High") priorityClass="priority-high";
if(item.priority==="Medium") priorityClass="priority-medium";

li.innerHTML=`
<div class="task-info" onclick="toggleComplete(${index})">
<strong>${item.name}</strong>
<small>📘 ${item.subject} | 📅 ${item.date || "No date"} |
<span class="${priorityClass}">🔥 ${item.priority}</span></small>
</div>

<button class="delete-btn" onclick="deleteTask(${index})">Delete</button>
`;

list.appendChild(li);

});

document.getElementById("emptyText").style.display =
list.children.length===0 ? "block":"none";

updateStats();

}

function deleteTask(index){
tasks.splice(index,1);
saveTasks();
renderTasks();
}

function toggleComplete(index){
tasks[index].completed=!tasks[index].completed;
saveTasks();
renderTasks();
}

function filterTasks(type){
currentFilter=type;
renderTasks();
}

function updateStats(){

let total=tasks.length;
let completed=tasks.filter(task=>task.completed).length;
let pending=total-completed;

document.getElementById("totalCount").innerText=total;
document.getElementById("completedCount").innerText=completed;
document.getElementById("pendingCount").innerText=pending;

let percent = total===0 ? 0 : (completed/total)*100;
document.getElementById("progressBar").style.width = percent + "%";

}

function saveTasks(){
localStorage.setItem("tasks",JSON.stringify(tasks));
}

function clearAllTasks(){

if(confirm("Delete all tasks?")){
tasks=[];
saveTasks();
renderTasks();
}

}

function toggleDarkMode(){
document.body.classList.toggle("dark");
}

</script>

</body>
</html>
